modals.notice.p1: "其实这个项目在开始的时候只是我因为想要学习前端开发而写的，随着内容越来越多，我实在离不开 AI 帮我写一些功能了；另外，代码越来越繁杂，界面一层 div 套一层，快到了必须重构的地步了。"
