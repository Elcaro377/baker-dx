modals.notice.title: "Baker-Dx will pause development for a while and migrate to Tauri"
modals.notice.confirm: "I Understand"
modals.notice.p1: "At first, I wrote this project because I wanted to learn frontend development. As the project grew, I increasingly relied on AI to help implement features. The code has also become more complicated, and the UI is now nested through many div layers, so it is reaching the point where a refactor is necessary."
modals.notice.p2: "This is a good moment to migrate to Tauri and use a more mature GUI stack."
modals.notice.p3: "The plan is: the main branch will continue to receive small updates, such as internationalization and style restoration, while feature-tauri will begin after I finish learning the basics of frontend development."
modals.notice.thanks: "Thank you for using this software!"
